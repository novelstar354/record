<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Wave Editor Recorder</title>
<link rel="icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQGnxuGoeJoJml4n_JIY5zieMNLWXm-uYJm9w&s" sizes="16x16" type="image/png" />
<style>

body{
margin:0;
font-family:system-ui;
background:linear-gradient(180deg,#141e30,#243b55);
color:white;
display:flex;
justify-content:center;
}

.app{
width:700px;
max-width:95%;
padding:20px;
}

h1{text-align:center}

button{
padding:10px 18px;
margin:5px;
border:none;
border-radius:8px;
cursor:pointer;
}

.record{background:#ff3b3b}
.stop{background:#ff9800}
.cut{background:#4caf50}
.save{background:#2196f3}

canvas{
width:100%;
background:#111;
border-radius:10px;
cursor:crosshair;
}

</style>
</head>

<body>

<div class="app">

<h1>Wave Editor</h1>

<button class="record" onclick="startRec()">録音</button>
<button class="stop" onclick="stopRec()">停止</button>
<button class="cut" onclick="cutSelection()">カット</button>
<button class="save" onclick="download()">保存</button>

<canvas id="wave" height="200"></canvas>

<audio id="player" controls style="width:100%"></audio>

</div>

<script>

let recorder;
let chunks=[];
let audioBuffer;

let audioCtx=new AudioContext();

const canvas=document.getElementById("wave");
const ctx=canvas.getContext("2d");

let startX=null;
let endX=null;

canvas.onmousedown=e=>{
startX=e.offsetX;
};

canvas.onmouseup=e=>{
endX=e.offsetX;
drawWave();
};

async function startRec(){

const stream=await navigator.mediaDevices.getUserMedia({audio:true});

recorder=new MediaRecorder(stream);

chunks=[];

recorder.ondataavailable=e=>chunks.push(e.data);

recorder.onstop=loadAudio;

recorder.start();

}

function stopRec(){
recorder.stop();
}

async function loadAudio(){

const blob=new Blob(chunks,{type:"audio/webm"});
const array=await blob.arrayBuffer();

audioBuffer=await audioCtx.decodeAudioData(array);

player.src=URL.createObjectURL(blob);

drawWave();

}

function drawWave(){

if(!audioBuffer)return;

ctx.clearRect(0,0,canvas.width,canvas.height);

const data=audioBuffer.getChannelData(0);

const step=Math.floor(data.length/canvas.width);

ctx.beginPath();

for(let i=0;i<canvas.width;i++){

let min=1;
let max=-1;

for(let j=0;j<step;j++){

let val=data[(i*step)+j];

if(val<min)min=val;
if(val>max)max=val;

}

ctx.moveTo(i,(1+min)*canvas.height/2);
ctx.lineTo(i,(1+max)*canvas.height/2);

}

ctx.strokeStyle="#00e5ff";
ctx.stroke();

if(startX!==null && endX!==null){

ctx.fillStyle="rgba(0,255,200,0.3)";
ctx.fillRect(startX,0,endX-startX,canvas.height);

}

}

function cutSelection(){

if(startX===null || endX===null)return;

let start=Math.min(startX,endX)/canvas.width;
let end=Math.max(startX,endX)/canvas.width;

let s=Math.floor(start*audioBuffer.length);
let e=Math.floor(end*audioBuffer.length);

let newLength=audioBuffer.length-(e-s);

let newBuffer=audioCtx.createBuffer(
audioBuffer.numberOfChannels,
newLength,
audioBuffer.sampleRate
);

for(let ch=0;ch<audioBuffer.numberOfChannels;ch++){

let oldData=audioBuffer.getChannelData(ch);
let newData=newBuffer.getChannelData(ch);

newData.set(oldData.slice(0,s),0);
newData.set(oldData.slice(e),s);

}

audioBuffer=newBuffer;

exportBuffer();

startX=null;
endX=null;

}

function exportBuffer(){

let offline=new OfflineAudioContext(
audioBuffer.numberOfChannels,
audioBuffer.length,
audioBuffer.sampleRate
);

let source=offline.createBufferSource();
source.buffer=audioBuffer;

source.connect(offline.destination);
source.start();

offline.startRendering().then(buffer=>{

let wav=encodeWAV(buffer);
let blob=new Blob([wav],{type:"audio/wav"});

player.src=URL.createObjectURL(blob);

drawWave();

});

}

function encodeWAV(buffer){

let length=buffer.length*2;
let array=new ArrayBuffer(44+length);
let view=new DataView(array);

function writeString(view,offset,string){
for(let i=0;i<string.length;i++){
view.setUint8(offset+i,string.charCodeAt(i));
}
}

let data=buffer.getChannelData(0);

writeString(view,0,"RIFF");
view.setUint32(4,36+length,true);
writeString(view,8,"WAVE");
writeString(view,12,"fmt ");
view.setUint32(16,16,true);
view.setUint16(20,1,true);
view.setUint16(22,1,true);
view.setUint32(24,buffer.sampleRate,true);
view.setUint32(28,buffer.sampleRate*2,true);
view.setUint16(32,2,true);
view.setUint16(34,16,true);
writeString(view,36,"data");
view.setUint32(40,length,true);

let offset=44;

for(let i=0;i<data.length;i++,offset+=2){

let s=Math.max(-1,Math.min(1,data[i]));
view.setInt16(offset,s<0?s*0x8000:s*0x7FFF,true);

}

return array;

}

function download(){

const a=document.createElement("a");
a.href=player.src;
a.download="edited.wav";
a.click();

}

</script>

</body>
</html>
